{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>📝 AI Quiz Generator</h1>
    <p>Create quizzes on any topic instantly.</p>
</div>

<div class="quiz-container">

    <input type="text" id="topic" placeholder="Enter Topic">

    <select id="difficulty">
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
    </select>

    <input type="number" id="questions" value="5" min="1" max="20">

    <button onclick="generateQuiz()">
        🚀 Generate Quiz
    </button>

</div>

<div class="result-box" id="quizResult">

</div>

<script>

async function generateQuiz(){

    let topic=document.getElementById("topic").value;

    let difficulty=document.getElementById("difficulty").value;

    let questions=document.getElementById("questions").value;

    if(topic==""){

        alert("Please enter topic");

        return;

    }

    document.getElementById("quizResult").innerHTML="⏳ Generating Quiz...";

    const response=await fetch("/quiz",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            topic:topic,

            difficulty:difficulty,

            num_questions:Number(questions)

        })

    });

    const data=await response.json();

    document.getElementById("quizResult").innerHTML=
    `<pre>${data.quiz}</pre>`;

    let quizCount=Number(localStorage.getItem("quizCount")) || 0;

    localStorage.setItem("quizCount",quizCount+1);

}

</script>

{% endblock %}
