{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>📊 Dashboard</h1>
    <p>Welcome back! Here's your EduGenie activity.</p>
</div>

<div class="dashboard-container">

    <!-- Statistics Cards -->
    <div class="stats-grid">

        <div class="stat-card">
            <h2 id="questionCount">0</h2>
            <h3>Questions Asked</h3>
        </div>

        <div class="stat-card">
            <h2 id="quizCount">0</h2>
            <h3>Quizzes Generated</h3>
        </div>

        <div class="stat-card">
            <h2 id="summaryCount">0</h2>
            <h3>Summaries Created</h3>
        </div>

        <div class="stat-card">
            <h2 id="roadmapCount">0</h2>
            <h3>Roadmaps Generated</h3>
        </div>

    </div>

    <!-- Recent Activity -->
    <div class="recent-card">

        <h2>📈 Recent Activity</h2>

        <div id="recentActivity"></div>

    </div>

</div>

<script>

const history = JSON.parse(localStorage.getItem("history")) || [];

document.getElementById("questionCount").innerHTML = history.length;

document.getElementById("quizCount").innerHTML =
localStorage.getItem("quizCount") || 0;

document.getElementById("summaryCount").innerHTML =
localStorage.getItem("summaryCount") || 0;

document.getElementById("roadmapCount").innerHTML =
localStorage.getItem("roadmapCount") || 0;

const recent = document.getElementById("recentActivity");

if(history.length === 0){

    recent.innerHTML = `
        <p>No recent activity yet.</p>
    `;

}else{

    history.slice().reverse().forEach(chat=>{

        recent.innerHTML += `
            <div class="activity-item">
                <strong>• ${chat.question}</strong><br>
                <small>${chat.time}</small>
                <hr>
            </div>
        `;

    });

}

</script>

{% endblock %}
